<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECNOENTRETE - CONTROL BAZAR</title>
    <style>
        :root { --main: #f39c12; --bg: #0d0d0d; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; text-align: center; }
        .ruleta-mini { width: 220px; height: 220px; border-radius: 50%; border: 5px solid #fff; margin: 20px auto; position: relative; transition: transform 8s cubic-bezier(0.1, 0.8, 0.1, 1); overflow: hidden; }
        .puntero { width: 30px; height: 40px; background: #fff; clip-path: polygon(50% 100%, 0 0, 100% 0); margin: -10px auto; z-index: 10; position: relative; }
        .btn { background: var(--main); padding: 20px; width: 90%; border-radius: 15px; font-weight: 900; margin: 10px 0; }
        .full-login { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:200; display:flex; flex-direction:column; justify-content:center; align-items:center; }
    </style>
</head>
<body>
    <div id="login-cajero" class="full-login">
        <h2>LOGIN TRABAJADOR</h2>
        <input type="password" id="p-cajero" style="padding:15px; text-align:center; margin-bottom:10px;" placeholder="CLAVE BAZAR">
        <button class="btn" onclick="checkCajero()">ENTRAR</button>
    </div>

    <div class="puntero"></div>
    <div id="r-mini" class="ruleta-mini"></div>
    <button class="btn" onclick="lanzarSorteo()">🎰 LANZAR SORTEO TV</button>
    <button class="btn" style="background:#222; color:#fff;">📸 FOTO PAGO / CONTADORES</button>
    <button class="btn" style="background:#222; color:#fff;">👥 REGISTRAR CLIENTELA</button>

    <script>
        const colores = ['#E50914','#1E90FF','#FFD700','#8A2BE2','#FF8C00','#00FA9A','#E50914','#1E90FF','#FFD700','#8A2BE2','#FF8C00','#00FA9A','#E50914','#1E90FF','#FFD700','#8A2BE2','#FF8C00'];
        
        function dibujar() {
            const r = document.getElementById('r-mini');
            let bg = 'conic-gradient(';
            const ang = 360/17;
            for(let i=1; i<=17; i++){
                bg += `${colores[i-1]} ${(i-1)*ang}deg ${i*ang}deg${i<17?',':')'}`;
                let d = document.createElement('div'); d.style.position='absolute'; d.style.width='100%'; d.style.height='100%';
                d.style.transform=`rotate(${(i-1)*ang + ang/2}deg)`;
                d.innerHTML=`<span style="position:absolute; top:10px; left:50%; transform:translateX(-50%); font-weight:900;">${i}</span>`;
                r.appendChild(d);
            }
            r.style.background = bg;
        }

        function checkCajero() {
            if(document.getElementById('p-cajero').value === "2026") { 
                document.getElementById('login-cajero').style.display='none';
            } else { alert("CLAVE INCORRECTA"); }
        }

        function lanzarSorteo() {
            const ganador = Math.floor(Math.random()*17)+1;
            const rot = 3600 - ((ganador-1)*(360/17)+(360/17)/2);
            localStorage.setItem('ultimo_ganador', ganador); // Sincroniza con la TV
            const r = document.getElementById('r-mini');
            r.style.transition = 'none'; r.style.transform = 'rotate(0deg)';
            setTimeout(() => {
                r.style.transition = 'transform 8s cubic-bezier(0.1, 0.7, 0.1, 1)';
                r.style.transform = `rotate(${rot}deg)`;
            }, 100);
        }
        dibujar();
    </script>
</body>
</html>
