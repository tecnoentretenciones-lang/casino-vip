<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECNOENTRETODO PRO - BAZAR</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav>
        <h1 id="brand">TECNOENTRETODO ⚡</h1>
        <div id="caja-header">CAJA HOY: <span id="monto-caja">$0</span></div>
    </nav>

    <div class="tabs">
        <button onclick="verTab('maquinas')">🎰 MÁQUINAS (1-17)</button>
        <button onclick="verTab('gastos')">💸 GASTOS/PASILLEROS</button>
        <button onclick="verTab('bonos')">💎 CLUB VIP QR</button>
    </div>

    <section id="sec-maquinas" class="tab-content">
        <div class="grid-maquinas" id="grid-bazar">
            </div>
    </section>

    <section id="sec-gastos" class="tab-content hidden">
        <div class="card">
            <h3>Registro de Egresos</h3>
            <input type="text" id="gasto-nom" placeholder="Nombre (Ej: Pasillero Juan)">
            <input type="number" id="gasto-val" placeholder="Monto $">
            <select id="gasto-cat">
                <option value="Consumo">Consumo (Bebidas/Galletas)</option>
                <option value="Aseo">Aseo/Local</option>
                <option value="Tecnico">Repuestos/Técnico</option>
            </select>
            <button class="btn-guardar" onclick="registrarGasto()">REGISTRAR GASTO</button>
        </div>
    </section>

    <section id="sec-bonos" class="tab-content hidden">
        <div class="card">
            <h3>Liberar Bono Fidelidad</h3>
            <p>Ingrese ID y PIN del cliente.</p>
            <input type="text" id="qr-input" placeholder="ID del Código QR">
            <input type="password" id="pin-input" placeholder="PIN de 4 dígitos">
            <button class="btn-bono" onclick="validarBono()">VERIFICAR Y PAGAR</button>
        </div>
    </section>

    <script src="app_master.js"></script>
</body>
</html>
