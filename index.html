<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TECNOENTRETE - GESTIÓN TOTAL</title>
    <style>
        :root { --main: #f39c12; --bg: #0d0d0d; --box: #1a1a1a; --rojo: #e74c3c; --verde: #2ecc71; --azul: #3498db; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; text-align: center; }
        
        /* Contenedores de Pantalla */
        .pantalla { display: none; padding: 20px; max-width: 600px; margin: 0 auto; min-height: 100vh; box-sizing: border-box; }
        .activa { display: flex; flex-direction: column; }
        
        /* Logo Corporativo */
        .logo-header { margin: 20px 0; }
        .logo-text { font-size: 40px; font-weight: 900; color: var(--main); letter-spacing: -1px; margin: 0; }
        .sub-text { color: #666; letter-spacing: 4px; font-size: 12px; text-transform: uppercase; }

        /* Menú de Cuadrícula (Dashboard) */
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .card { background: var(--box); border: 1px solid #333; border-radius: 20px; padding: 25px 10px; cursor: pointer; transition: 0.3s; }
        .card:active { transform: scale(0.95); background: #222; }
        .card i { font-size: 40px; display: block; margin-bottom: 10px; }
        .card h3 { margin: 5px 0; font-size: 14px; color: var(--main); }

        /* Botones y Formularios */
        .btn { background: var(--main); color: #000; border: none; padding: 18px; width: 100%; border-radius: 15px; font-weight: 900; font-size: 16px; text-transform: uppercase; cursor: pointer; margin-bottom: 15px; }
        .btn-sec { background: #333; color: #fff; }
        input, select { width: 100%; background: #000; color: #fff; border: 1px solid #444; padding: 15px; border-radius: 12px; margin-bottom: 12px; box-sizing: border-box; text-align: center; font-size: 16px; }

        /* Sección de Máquinas (Bazar) */
        .lista-maquinas { background: var(--box); border-radius: 15px; padding: 10px; max-height: 400px; overflow-y: auto; text-align: left; }
        .fila-maq { display: grid; grid-template-columns: 40px 1fr 1fr; gap: 10px; align-items: center; padding: 10px; border-bottom: 1px solid #333; }
        .num-maq { color: var(--main); font-weight: bold; }
    </style>
</head>
<body>

    <div id="p-login" class="pantalla activa">
        <div class="logo-header">
            <h1 class="logo-text">TECNOENTRETE</h1>
            <p class="sub-text">Sistema de Control 2026</p>
        </div>
        <div style="margin-top: 50px;">
            <input type="text" id="user" placeholder="USUARIO">
            <input type="password" id="pass" placeholder="CLAVE">
            <button class="btn" onclick="login()">ENTRAR AL CEREBRO</button>
        </div>
    </div>

    <div id="p-menu" class="pantalla">
        <div class="logo-header">
            <h2 class="logo-text" style="font-size: 25px;">MENÚ PRINCIPAL</h2>
        </div>
        <div class="grid-menu">
            <div class="card" onclick="ir('p-locales')"><i>🏢</i><h3>LOCALES</h3></div>
            <div class="card" onclick="ir('p-consignacion')"><i>🤝</i><h3>CONSIGNACIÓN</h3></div>
            <div class="card" onclick="ir('p-gastos')"><i>💳</i><h3>GASTOS EMPRESA</h3></div>
            <div class="card" onclick="ir('p-personal')"><i>👥</i><h3>PERSONAL</h3></div>
        </div>
        <button class="btn btn-sec" style="margin-top: 40px;" onclick="ir('p-login')">SALIR</button>
    </div>

    <div id="p-locales" class="pantalla">
        <button class="btn btn-sec" onclick="ir('p-menu')">⬅ VOLVER</button>
        <h2 style="color:var(--main);">MIS LOCALES</h2>
        <button class="btn" onclick="abrirLocalBazar()">🏪 BAZAR (17 MÁQUINAS)</button>
        <button class="btn btn-sec">🏪 LOCAL 2 (PRÓX.)</button>
    </div>

    <div id="p-bazar" class="pantalla">
        <button class="btn btn-sec" onclick="ir('p-locales')">⬅ SALIR DEL LOCAL</button>
        <h2 id="nom-bazar">BAZAR - <span id="rol-actual"></span></h2>
        
        <div class="grid-menu">
            <div class="card" onclick="ir('p-contabilidad-foto')"><i>📸</i><h3>FOTO CONTABLE</h3></div>
            <div class="card" onclick="ir('p-sorteo')"><i>🎡</i><h3>TIRAR SORTEO</h3></div>
        </div>
    </div>

    <div id="p-contabilidad-foto" class="pantalla">
        <button class="btn btn-sec" onclick="ir('p-bazar')">⬅ CANCELAR</button>
        <h3>REGISTRO POR FOTO</h3>
        <select id="maquina-n">
            <script>for(let i=1;i<=17;i++) document.write(`<option value="${i}">MÁQUINA ${i}</option>`)</script>
        </select>
        <div style="background:#222; padding:20px; border-radius:15px; border:2px dashed var(--main);">
            <input type="file" accept="image/*" capture="camera" id="cam-input">
            <p>TOMA FOTO AL CONTADOR</p>
        </div>
        <input type="number" placeholder="ENTRADA LECTURA" style="margin-top:15px;">
        <input type="number" placeholder="SALIDA LECTURA">
        <button class="btn" onclick="alert('IA Procesando Foto...')">GUARDAR Y SUBIR</button>
    </div>

    <div id="p-sorteo" class="pantalla">
        <button class="btn btn-sec" onclick="ir('p-bazar')">⬅ VOLVER</button>
        <h2>CONTROL DE RULETA</h2>
        <div style="width:250px; height:250px; border:5px solid #fff; border-radius:50%; margin:20px auto; background: conic-gradient(red, blue, yellow, green, purple, orange, red); transition: 5s cubic-bezier(0.1, 0.8, 0.1, 1);" id="r-visual"></div>
        <button class="btn" style="background:var(--verde)" onclick="lanzarSorteo()">GIRAR EN TV DEL BAZAR</button>
    </div>

    <script>
        // Lógica de Navegación Simple
        function ir(id) {
            document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
            document.getElementById(id).classList.add('activa');
        }

        function login() {
            const u = document.getElementById('user').value.toUpperCase();
            if(u === "FELIPE") {
                ir('p-menu');
            } else {
                // Si es un trabajador, va directo a su local
                document.getElementById('rol-actual').innerText = "PASILLERO";
                ir('p-bazar');
            }
        }

        function abrirLocalBazar() {
            document.getElementById('rol-actual').innerText = "ADMIN";
            ir('p-bazar');
        }

        function lanzarSorteo() {
            const r = document.getElementById('r-visual');
            const g = Math.floor(Math.random() * 360) + 3600;
            r.style.transform = `rotate(${g}deg)`;
            alert("¡Sorteo enviado a la pantalla de clientes!");
        }
    </script>
</body>
</html>
