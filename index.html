<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CASINO VIP - BAZZAN</title>
    <style>
        :root { --main: #f39c12; --bg: #0d0d0d; --box: #1a1a1a; --rojo: #e74c3c; --verde: #2ecc71; --blanco: #fff; }
        body { background: var(--bg); color: var(--blanco); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; text-align: center; }
        .pantalla { display: none; padding: 20px; max-width: 500px; margin: 0 auto; min-height: 100vh; }
        .activa { display: block; }
        input { width: 100%; background: #000; color: var(--main); border: 1px solid var(--main); padding: 15px; border-radius: 10px; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; text-align: center; outline: none; }
        .btn { background: var(--main); color: #000; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; margin-bottom: 15px; }
        .btn:active { transform: scale(0.95); }
        .btn-rojo { background: var(--rojo); color: white;}
        .header { background: var(--box); border-bottom: 2px solid var(--main); padding: 15px; margin-bottom: 20px; border-radius: 0 0 15px 15px; }
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .ruleta-wrapper { position: relative; width: 300px; height: 300px; margin: 20px auto; }
        .pequena { transform: scale(0.7); margin: -40px auto; }
        .ruleta-circulo { width: 100%; height: 100%; border-radius: 50%; border: 4px solid #fff; position: relative; transition: transform 8s cubic-bezier(0.1, 0.8, 0.1, 1); overflow: hidden; }
        .puntero { position: absolute; top: -20px; left: calc(50% - 20px); width: 40px; height: 45px; background: #fff; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10; }
        #ruleta-publica { background: radial-gradient(circle, #222 0%, #000 100%); height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #loader { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; color:var(--main); justify-content:center; align-items:center; flex-direction:column; }
        .modal-premio { display:none; background: var(--main); color:black; padding: 20px; font-size: 30px; font-weight: 900; border-radius: 15px; margin-top: 20px; box-shadow: 0 0 30px var(--main); }
    </style>
</head>
<body>

    <script>
        const API_GAS = "https://script.google.com/macros/s/AKfycbwOmMwYOysgrE-ZS6s1OxfnY63G8s4F9FhzsJU9jqufLflVmeaOADowLPrQi2r4RemO/exec";
        const API_VISION = "AIzaSyBi9F3K2PXOeRoR2w-rf63u8d6PZyFUT-U"; 
        let usuarioActual = "";
        let yaMostrePremio = false;
    </script>

    <div id="loader"><h2 id="loader-txt">Conectando...</h2></div>

    <div id="pantalla-login" class="pantalla activa">
        <h1 style="color:var(--main); font-size: 40px;">CASINO VIP</h1>
        <input type="text" id="l-user" placeholder="Usuario">
        <input type="password" id="l-pass" placeholder="Clave">
        <button class="btn" onclick="iniciarSesion()">ENTRAR</button>
        <button class="btn" style="background:#333; color:#fff;" onclick="verRuletaPublica()">PANTALLA CLIENTES</button>
    </div>

    <div id="pantalla-dashboard" class="pantalla">
        <div class="header"><h3>CAJERO: <span id="nom-cajero" style="color:var(--main);"></span></h3></div>
        <div class="nav-grid">
            <button class="btn" onclick="mostrarSeccion('sec-ruleta')">🎡 RULETA</button>
            <button class="btn btn-rojo" onclick="location.reload()">SALIR</button>
        </div>
        <div id="sec-ruleta">
            <button class="btn" style="background:#3498db; color:white;" onclick="controlRuleta('ACTIVAR')">MOSTRAR RULETA</button>
            <button class="btn btn-rojo" onclick="controlRuleta('APAGAR')">APAGAR/RESETEAR</button>
            <button class="btn" style="background:#2ecc71; font-size: 20px;" onclick="girarRuletaAdmin()">🎰 LANZAR SORTEO</button>
            <div class="ruleta-wrapper pequena" id="wrap-ruleta-cajero" style="display:none;">
                <div class="puntero"></div><div class="ruleta-circulo" id="ruleta-cajero"></div>
            </div>
        </div>
    </div>

    <div id="ruleta-publica" class="pantalla">
        <div id="telon" style="font-size:24px; color:var(--main);">⏳ ESPERANDO SORTEO...</div>
        <div class="ruleta-wrapper" id="wrap-ruleta-cliente" style="display:none;">
            <div class="puntero"></div><div class="ruleta-circulo" id="ruleta-cliente"></div>
        </div>
        <div id="premio-ganador" class="modal-premio">MÁQUINA <span id="ganador-txt"></span> GANA</div>
    </div>

    <script>
        function loader(txt) { document.getElementById('loader-txt').innerText = txt; document.getElementById('loader').style.display = 'flex'; }
        function ocultarLoader() { document.getElementById('loader').style.display = 'none'; }
        function mostrarSeccion(id) { document.getElementById('sec-ruleta').style.display='block'; }

        async function iniciarSesion() {
            let u = document.getElementById('l-user').value.trim();
            let p = document.getElementById('l-pass').value.trim();
            if(!u || !p) return alert("Faltan datos");
            loader("Entrando...");
            try {
                const resp = await fetch(`${API_GAS}?action=login&u=${u}&p=${p}`);
                const data = await resp.json();
                if(data.status === "success") {
                    usuarioActual = data.usuario;
                    document.getElementById('nom-cajero').innerText = usuarioActual.toUpperCase();
                    document.getElementById('pantalla-login').classList.remove('activa');
                    document.getElementById('pantalla-dashboard').classList.add('activa');
                } else { alert("Usuario o Clave incorrecta"); }
            } catch(e) { alert("Error de servidor Excel. Reintenta."); }
            ocultarLoader();
        }

        function construir(id) {
            let r = document.getElementById(id); let ang = 360/17;
            let cols = ['#E50914','#1E90FF','#FFD700','#8A2BE2','#FF8C00','#00FA9A'];
            let bg = 'conic-gradient(';
            for(let i=1; i<=17; i++) {
                bg += `${cols[(i-1)%cols.length]} ${(i-1)*ang}deg ${i*ang}deg${i<17?',':')'}`;
            }
            r.style.background = bg;
        }
        construir('ruleta-cajero'); construir('ruleta-cliente');

        async function controlRuleta(cmd, gan="") {
            if(cmd==='APAGAR') document.getElementById('wrap-ruleta-cajero').style.display='none';
            if(cmd==='ACTIVAR') document.getElementById('wrap-ruleta-cajero').style.display='block';
            fetch(`${API_GAS}?action=ruleta_control&comando=${cmd}&ganador=${gan}`);
        }

        function girarRuletaAdmin() {
            let g = Math.floor(Math.random()*17)+1;
            controlRuleta("GIRAR", g);
            let r = document.getElementById('ruleta-cajero');
            r.style.transition = 'none'; r.style.transform = 'rotate(0deg)';
            setTimeout(() => {
                r.style.transition = 'transform 8s cubic-bezier(0.1, 0.7, 0.1, 1)';
                r.style.transform = `rotate(${3600 - ((g-1)*(360/17) + (360/17)/2)}deg)`;
            }, 50);
        }

        function verRuletaPublica() {
            document.getElementById('pantalla-login').classList.remove('activa');
            document.getElementById('ruleta-publica').classList.add('activa');
            setInterval(async () => {
                try {
                    let res = await fetch(`${API_GAS}?action=ruleta_estado`);
                    let d = await res.json();
                    let telon = document.getElementById('telon'); 
                    let wrap = document.getElementById('wrap-ruleta-cliente');
                    let premio = document.getElementById('premio-ganador');
                    if(d.estado==="ESPERA") { telon.style.display="block"; wrap.style.display="none"; premio.style.display="none"; yaMostrePremio=false; }
                    if(d.estado==="ACTIVA") { telon.style.display="none"; wrap.style.display="block"; premio.style.display="none"; yaMostrePremio=false; }
                    if(d.estado==="GIRANDO" && !yaMostrePremio) {
                        yaMostrePremio = true;
                        let r = document.getElementById('ruleta-cliente');
                        r.style.transition='none'; r.style.transform='rotate(0deg)';
                        setTimeout(() => {
                            r.style.transition='transform 8s cubic-bezier(0.1, 0.7, 0.1, 1)';
                            r.style.transform=`rotate(${3600 - ((d.ganador-1)*(360/17)+(360/17)/2)}deg)`;
                        }, 50);
                        setTimeout(() => { document.getElementById('ganador-txt').innerText=d.ganador; premio.style.display="block"; }, 8500);
                    }
                } catch(e){}
            }, 2000);
        }
    </script>
</body>
</html>
