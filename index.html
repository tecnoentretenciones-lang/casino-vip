<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CASINO VIP - BAZZAN</title>
    <style>
        :root { --main: #f39c12; --bg: #0d0d0d; --box: #1a1a1a; --rojo: #e74c3c; --verde: #2ecc71; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; text-align: center; }
        .pantalla { display: none; padding: 20px; max-width: 500px; margin: 0 auto; min-height: 100vh; }
        .activa { display: block; }
        .logo-container { margin: 30px 0; }
        .logo-text { font-size: 50px; font-weight: 900; color: var(--main); letter-spacing: -2px; margin: 0; }
        .sub-text { color: #555; letter-spacing: 4px; font-size: 14px; margin-top: -5px; }
        input { width: 100%; background: #000; color: var(--main); border: 1px solid #333; padding: 18px; border-radius: 12px; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; text-align: center; outline: none; }
        .btn { background: var(--main); color: #000; border: none; padding: 20px; width: 100%; border-radius: 15px; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; margin-bottom: 15px; }
        .btn:active { transform: scale(0.96); }
        .btn-secundario { background: #1a1a1a; color: #fff; border: 1px solid #333; }
        .header-cajero { background: var(--box); padding: 20px; border-radius: 0 0 25px 25px; border-bottom: 2px solid var(--main); margin-bottom: 25px; }
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .ruleta-wrapper { position: relative; width: 300px; height: 300px; margin: 20px auto; }
        .pequena { transform: scale(0.7); margin: -40px auto; }
        .ruleta-circulo { width: 100%; height: 100%; border-radius: 50%; border: 5px solid #fff; position: relative; transition: transform 8s cubic-bezier(0.1, 0.8, 0.1, 1); overflow: hidden; }
        .puntero { position: absolute; top: -20px; left: calc(50% - 20px); width: 40px; height: 45px; background: #fff; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10; }
        #loader { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; justify-content:center; align-items:center; color: var(--main); }
    </style>
</head>
<body>
    <script>
        const API_GAS = "https://script.google.com/macros/s/AKfycbzlF7OhLViqAg0V6Dl1nv_HgpG55vfIXkYcB-SVow__dx-xl7fXNvxaAi3bCO-OF-2/exec";
        let usuarioActual = "";
        let yaMostrePremio = false;
    </script>

    <div id="loader"><h2>CONECTANDO...</h2></div>

    <div id="pantalla-login" class="pantalla activa">
        <div class="logo-container"><h1 class="logo-text">CASINO VIP</h1><p class="sub-text">SISTEMA BAZZAN</p></div>
        <input type="text" id="l-user" placeholder="USUARIO">
        <input type="password" id="l-pass" placeholder="CLAVE">
        <button class="btn" onclick="iniciarSesion()">ENTRAR</button>
        <button class="btn btn-secundario" onclick="verRuletaPublica()">PANTALLA CLIENTES</button>
    </div>

    <div id="pantalla-dashboard" class="pantalla">
        <div class="header-cajero"><h3>HOLA: <span id="nom-cajero" style="color:var(--main);"></span></h3></div>
        <div class="nav-grid">
            <button class="btn btn-secundario" onclick="mostrarSeccion('sec-vales')">VALES</button>
            <button class="btn btn-secundario" onclick="mostrarSeccion('sec-ruleta')">RULETA</button>
        </div>
        <div id="sec-ruleta" style="display:none;">
            <button class="btn" style="background:#3498db; color:white;" onclick="controlRuleta('ACTIVAR')">MOSTRAR</button>
            <button class="btn btn-rojo" onclick="controlRuleta('APAGAR')">APAGAR</button>
            <button class="btn" style="background:var(--verde);" onclick="girarRuletaAdmin()">🎰 SORTEO</button>
            <div class="ruleta-wrapper pequeña" id="wrap-ruleta-cajero" style="display:none;"><div class="puntero"></div><div class="ruleta-circulo" id="ruleta-cajero"></div></div>
        </div>
    </div>

    <div id="ruleta-publica" class="pantalla">
        <div id="telon" style="font-size:24px; color:var(--main);">⏳ ESPERANDO...</div>
        <div class="ruleta-wrapper" id="wrap-ruleta-cliente" style="display:none;"><div class="puntero"></div><div class="ruleta-circulo" id="ruleta-cliente"></div></div>
        <div id="premio-ganador" style="display:none; background:var(--main); color:black; padding:20px; border-radius:15px; font-size:30px; margin-top:20px; font-weight:900;">MÁQUINA <span id="ganador-txt"></span> GANA</div>
    </div>

    <script>
        function loader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
        function mostrarSeccion(id) { document.getElementById('sec-ruleta').style.display='block'; }
        async function iniciarSesion() {
            let u = document.getElementById('l-user').value.trim();
            let p = document.getElementById('l-pass').value.trim();
            loader(true);
            try {
                const resp = await fetch(`${API_GAS}?action=login&u=${u}&p=${p}`);
                const data = await resp.json();
                if(data.status === "success") {
                    usuarioActual = data.usuario;
                    document.getElementById('nom-cajero').innerText = usuarioActual;
                    document.getElementById('pantalla-login').classList.remove('activa');
                    document.getElementById('pantalla-dashboard').classList.add('activa');
                } else { alert("Acceso Incorrecto"); }
            } catch(e) { alert("Error de Servidor"); }
            loader(false);
        }
        function construir(id) {
            let r = document.getElementById(id); let ang = 360/17;
            let cols = ['#E50914','#1E90FF','#FFD700','#8A2BE2','#FF8C00','#00FA9A'];
            let bg = 'conic-gradient(';
            for(let i=1; i<=17; i++) {
                bg += `${cols[(i-1)%cols.length]} ${(i-1)*ang}deg ${i*ang}deg${i<17?',':')'}`;
                let n = document.createElement('div'); n.style.position='absolute'; n.style.width='100%'; n.style.height='100%';
                n.style.transform=`rotate(${(i-1)*ang + ang/2}deg)`;
                n.innerHTML=`<span style="position:absolute; top:10px; left:50%; transform:translateX(-50%); font-weight:900; font-size:18px;">${i}</span>`;
                r.appendChild(n);
            }
            r.style.background = bg;
        }
        construir('ruleta-cajero'); construir('ruleta-cliente');
        async function controlRuleta(cmd, gan="") {
            if(cmd==='APAGAR') document.getElementById('wrap-ruleta-cajero').style.display='none';
            if(cmd==='ACTIVAR') document.getElementById('wrap-ruleta-cajero').style.display='block';
            fetch(`${API_GAS}?action=ruleta_control&comando=${cmd}&ganador=${gan}`);
        }
        function girarRuletaAdmin() {
            let g = Math.floor(Math.random()*17)+1;
            controlRuleta("GIRAR", g);
            let r = document.getElementById('ruleta-cajero');
            r.style.transition='none'; r.style.transform='rotate(0deg)';
            setTimeout(() => {
                r.style.transition='transform 8s cubic-bezier(0.1, 0.7, 0.1, 1)';
                r.style.transform=`rotate(${3600 - ((g-1)*(360/17) + (360/17)/2)}deg)`;
            }, 50);
        }
        function verRuletaPublica() {
            document.getElementById('pantalla-login').classList.remove('activa');
            document.getElementById('ruleta-publica').classList.add('activa');
            setInterval(async () => {
                try {
                    let res = await fetch(`${API_GAS}?action=ruleta_estado`);
                    let d = await res.json();
                    if(d.estado==="ESPERA") { document.getElementById('telon').style.display="block"; document.getElementById('wrap-ruleta-cliente').style.display="none"; document.getElementById('premio-ganador').style.display="none"; yaMostrePremio=false; }
                    if(d.estado==="ACTIVA") { document.getElementById('telon').style.display="none"; document.getElementById('wrap-ruleta-cliente').style.display="block"; document.getElementById('premio-ganador').style.display="none"; yaMostrePremio=false; }
                    if(d.estado==="GIRANDO" && !yaMostrePremio) {
                        yaMostrePremio = true;
                        let r = document.getElementById('ruleta-cliente');
                        r.style.transition='none'; r.style.transform='rotate(0deg)';
                        setTimeout(() => {
                            r.style.transition='transform 8s cubic-bezier(0.1, 0.7, 0.1, 1)';
                            r.style.transform=`rotate(${3600 - ((d.ganador-1)*(360/17)+(360/17)/2)}deg)`;
                        }, 50);
                        setTimeout(() => { document.getElementById('ganador-txt').innerText=d.ganador; document.getElementById('premio-ganador').style.display="block"; }, 8500);
                    }
                } catch(e){}
            }, 2000);
        }
    </script>
</body>
</html>
