<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CASINO VIP - BAZZAN</title>
    <style>
        :root { --main: #f39c12; --bg: #0d0d0d; --box: #1a1a1a; --rojo: #e74c3c; --verde: #2ecc71; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; text-align: center; }
        
        /* DISEÑO ORIGINAL VIP */
        .pantalla { display: none; padding: 20px; max-width: 500px; margin: 0 auto; min-height: 100vh; }
        .activa { display: block; }
        
        .logo-container { margin: 20px 0; }
        .logo-text { font-size: 45px; font-weight: 900; color: var(--main); letter-spacing: -2px; margin: 0; }
        .sub-text { color: #555; letter-spacing: 3px; font-size: 12px; margin-top: -5px; }

        input { width: 100%; background: #000; color: var(--main); border: 1px solid #333; padding: 18px; border-radius: 12px; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; text-align: center; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--main); box-shadow: 0 0 10px rgba(243,156,18,0.2); }

        .btn { background: var(--main); color: #000; border: none; padding: 20px; width: 100%; border-radius: 15px; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        .btn:active { transform: scale(0.96); opacity: 0.8; }
        .btn-secundario { background: #1a1a1a; color: #fff; border: 1px solid #333; }
        .btn-rojo { background: var(--rojo); color: #fff; }
        .btn-verde { background: var(--verde); color: #000; }

        .header-cajero { background: var(--box); padding: 20px; border-radius: 0 0 25px 25px; border-bottom: 2px solid var(--main); margin-bottom: 25px; }
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }

        /* RULETA */
        .ruleta-wrapper { position: relative; width: 320px; height: 320px; margin: 30px auto; }
        .pequena { transform: scale(0.7); margin: -40px auto; }
        .ruleta-circulo { width: 100%; height: 100%; border-radius: 50%; border: 5px solid #fff; position: relative; transition: transform 8s cubic-bezier(0.1, 0.8, 0.1, 1); overflow: hidden; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .puntero { position: absolute; top: -25px; left: calc(50% - 20px); width: 40px; height: 50px; background: #fff; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10; filter: drop-shadow(0 5px 5px #000); }
        
        #ruleta-publica { background: radial-gradient(circle, #222 0%, #000 100%); height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .modal-premio { display:none; background: var(--main); color:black; padding: 25px 50px; font-size: 35px; font-weight: 900; border-radius: 20px; margin-top: 30px; box-shadow: 0 0 50px var(--main); }
        
        #loader { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; justify-content:center; align-items:center; color: var(--main); }
    </style>
</head>
<body>

    <script>
        const API_GAS = "https://script.google.com/macros/s/AKfycbzlF7OhLViqAg0V6Dl1nv_HgpG55vfIXkYcB-SVow__dx-xl7fXNvxaAi3bCO-OF-2/exec";
        const API_VISION = "AIzaSyBi9F3K2PXOeRoR2w-rf63u8d6PZyFUT-U"; 
        let usuarioActual = "";
        let yaMostrePremio = false;
    </script>

    <div id="loader"><h2>PROCESANDO...</h2></div>

    <div id="pantalla-login" class="pantalla activa">
        <div class="logo-container">
            <h1 class="logo-text">CASINO VIP</h1>
            <p class="sub-text">SISTEMA BAZZAN</p>
        </div>
        <input type="text" id="l-user" placeholder="USUARIO">
        <input type="password" id="l-pass" placeholder="CLAVE">
        <button class="btn" onclick="iniciarSesion()">ACCEDER AL SISTEMA</button>
        <button class="btn btn-secundario" onclick="verRuletaPublica()">PANTALLA CLIENTES</button>
    </div>

    <div id="pantalla-dashboard" class="pantalla">
        <div class="header-cajero">
            <p style="margin:0; color:#666; font-size:12px;">SESIÓN INICIADA</p>
            <h3 style="margin:5px 0; color:var(--main);"><span id="nom-cajero"></span></h3>
        </div>

        <div class="nav-grid">
            <button class="btn btn-secundario" onclick="mostrarSeccion('sec-vales')">🧾 VALES</button>
            <button class="btn btn-secundario" onclick="mostrarSeccion('sec-bonos')">🎁 BONOS</button>
            <button class="btn btn-secundario" onclick="mostrarSeccion('sec-ruleta')">🎡 RULETA</button>
            <button class="btn btn-rojo" onclick="location.reload()">🚪 SALIR</button>
        </div>

        <div id="sec-vales" style="display:block;">
            <input type="file" accept="image/*" capture="environment" id="cam-vale" style="display:none;" onchange="procesarIA(this, 'vale')">
            <button class="btn" style="height:120px; background:transparent; border:2px dashed var(--main); color:var(--main);" onclick="document.getElementById('cam-vale').click()">📸 FOTO VOUCHER</button>
            <div id="form-vale" style="display:none; margin-top:15px;">
                <input type="text" id="v-cod" placeholder="CÓDIGO">
                <input type="number" id="v-pag" placeholder="MONTO $">
                <button class="btn btn-verde" onclick="guardarDato('registrar_vale')">CONFIRMAR PAGO</button>
            </div>
        </div>

        <div id="sec-bonos" style="display:none;">
            <input type="file" accept="image/*" capture="environment" id="cam-bono" style="display:none;" onchange="procesarIA(this, 'bono')">
            <button class="btn" style="height:120px; background:transparent; border:2px dashed var(--verde); color:var(--verde);" onclick="document.getElementById('cam-bono').click()">📸 FOTO CARNET</button>
            <div id="form-bono" style="display:none; margin-top:15px;">
                <input type="text" id="b-rut" placeholder="RUT">
                <button class="btn btn-verde" onclick="guardarDato('registrar_bono')">REGISTRAR BONO</button>
            </div>
        </div>

        <div id="sec-ruleta" style="display:none;">
            <button class="btn btn-secundario" onclick="controlRuleta('ACTIVAR')">MOSTRAR RULETA</button>
            <button class="btn btn-rojo" onclick="controlRuleta('APAGAR')">APAGAR / RESET</button>
            <button class="btn btn-verde" onclick="girarRuletaAdmin()">🎰 LANZAR SORTEO</button>
            <div class="ruleta-wrapper pequeña" id="wrap-ruleta-cajero" style="display:none;">
                <div class="puntero"></div><div class="ruleta-circulo" id="ruleta-cajero"></div>
            </div>
        </div>
    </div>

    <div id="ruleta-publica" class="pantalla">
        <div id="telon" style="font-size:28px; font-weight:900; color:var(--main);">⏳ ESPERANDO SORTEO...</div>
        <div class="ruleta-wrapper" id="wrap-ruleta-cliente" style="display:none;">
            <div class="puntero"></div><div class="ruleta-circulo" id="ruleta-cliente"></div>
        </div>
        <div id="premio-ganador" class="modal-premio">MÁQUINA <span id="ganador-txt"></span> GANA</div>
    </div>

    <script>
        function loader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
        function mostrarSeccion(id) { ['sec-vales','sec-bonos','sec-ruleta'].forEach(s => document.getElementById(s).style.display='none'); document.getElementById(id).style.display='block'; }

        async function iniciarSesion() {
            let u = document.getElementById('l-user').value.trim();
            let p = document.getElementById('l-pass').value.trim();
            loader(true);
            try {
                const resp = await fetch(`${API_GAS}?action=login&u=${u}&p=${p}`);
                const data = await resp.json();
                if(data.status === "success") {
                    usuarioActual = data.usuario;
                    document.getElementById('nom-cajero').innerText = usuarioActual.toUpperCase();
                    document.getElementById('pantalla-login').classList.remove('activa');
                    document.getElementById('pantalla-dashboard').classList.add('activa');
                } else { alert("ACCESO DENEGADO"); }
            } catch(e) { alert("ERROR DE CONEXIÓN"); }
            loader(false);
        }

        function construir(id) {
            let r = document.getElementById(id); let ang = 360/17;
            let cols = ['#E50914','#1E90FF','#FFD700','#8A2BE2','#FF8C00','#00FA9A'];
            let bg = 'conic-gradient(';
            for(let i=1; i<=17; i++) {
                bg += `${cols[(i-1)%cols.length]} ${(i-1)*ang}deg ${i*ang}deg${i<17?',':')'}`;
                let n = document.createElement('div'); n.style.position='absolute'; n.style.width='100%'; n.style.height='100%';
                n.style.transform=`rotate(${(i-1)*ang + ang/2}deg)`;
                n.innerHTML=`<span style="position:absolute; top:10px; left:50%; transform:translateX(-50%); font-weight:900; font-size:22px; color:#fff; text-shadow:2px 2px 2px #000;">${i}</span>`;
                r.appendChild(n);
            }
            r.style.background = bg;
        }
        construir('ruleta-cajero'); construir('ruleta-cliente');

        async function controlRuleta(cmd, gan="") {
            if(cmd==='APAGAR') document.getElementById('wrap-ruleta-cajero').style.display='none';
            if(cmd==='ACTIVAR') document.getElementById('wrap-ruleta-cajero').style.display='block';
            fetch(`${API_GAS}?action=ruleta_control&comando=${cmd}&ganador=${gan}`);
        }

        function girarRuletaAdmin() {
            let g = Math.floor(Math.random()*17)+1;
            controlRuleta("GIRAR", g);
            let r = document.getElementById('ruleta-cajero');
            r.style.transition='none'; r.style.transform='rotate(0deg)';
            setTimeout(() => {
                r.style.transition='transform 8s cubic-bezier(0.1, 0.7, 0.1, 1)';
                r.style.transform=`rotate(${3600 - ((g-1)*(360/17) + (360/17)/2)}deg)`;
            }, 100);
        }

        function verRuletaPublica() {
            document.getElementById('pantalla-login').classList.remove('activa');
            document.getElementById('ruleta-publica').classList.add('activa');
            setInterval(async () => {
                try {
                    let res = await fetch(`${API_GAS}?action=ruleta_estado`);
                    let d = await res.json();
                    let telon = document.getElementById('telon'); 
                    let wrap = document.getElementById('wrap-ruleta-cliente');
                    let premio = document.getElementById('premio-ganador');
                    if(d.estado==="ESPERA") { telon.style.display="block"; wrap.style.display="none"; premio.style.display="none"; yaMostrePremio=false; }
                    if(d.estado==="ACTIVA") { telon.style.display="none"; wrap.style.display="block"; premio.style.display="none"; yaMostrePremio=false; }
                    if(d.estado==="GIRANDO" && !yaMostrePremio) {
                        yaMostrePremio = true;
                        let r_cl = document.getElementById('ruleta-cliente');
                        r_cl.style.transition='none'; r_cl.style.transform='rotate(0deg)';
                        setTimeout(() => {
                            r_cl.style.transition='transform 8s cubic-bezier(0.1, 0.7, 0.1, 1)';
                            r_cl.style.transform=`rotate(${3600 - ((d.ganador-1)*(360/17)+(360/17)/2)}deg)`;
                        }, 100);
                        setTimeout(() => { document.getElementById('ganador-txt').innerText=d.ganador; premio.style.display="block"; }, 8500);
                    }
                } catch(e){}
            }, 2000);
        }

        async function procesarIA(input, tipo) {
            if(!input.files[0]) return;
            loader(true);
            try {
                let fr = new FileReader(); fr.readAsDataURL(input.files[0]);
                fr.onload = async () => {
                    let res = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${API_VISION}`, {
                        method: 'POST', body: JSON.stringify({ requests: [{ image: { content: fr.result.split(",")[1] }, features: [{ type: "TEXT_DETECTION" }] }] })
                    });
                    let data = await res.json();
                    let texto = data.responses[0].fullTextAnnotation.text;
                    if(tipo === 'vale') {
                        document.getElementById('v-cod').value = texto.match(/\d{5,}/) ? texto.match(/\d{5,}/)[0] : "MANUAL";
                        document.getElementById('form-vale').style.display = 'block';
                    } else {
                        document.getElementById('b-rut').value = texto.match(/\d{7,10}/) ? texto.match(/\d{7,10}/)[0] : "MANUAL";
                        document.getElementById('form-bono').style.display = 'block';
                    }
                }
            } catch(e) { alert("ERROR IA"); document.getElementById('form-'+tipo).style.display='block'; }
            loader(false);
        }

        async function guardarDato(accion) {
            loader(true);
            let p = { action: accion, cajero: usuarioActual };
            if(accion==='registrar_vale') {
                p.codigo = document.getElementById('v-cod').value;
                p.monto_pag = document.getElementById('v-pag').value;
            } else { p.rut = document.getElementById('b-rut').value; p.monto = 2000; }
            try {
                await fetch(API_GAS, { method: 'POST', body: JSON.stringify(p) });
                alert("REGISTRO EXITOSO"); location.reload();
            } catch(e) { alert("ERROR AL GUARDAR"); }
            loader(false);
        }
    </script>
</body>
</html>
