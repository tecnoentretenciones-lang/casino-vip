<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CASINO VIP - BAZZAN</title>
    <style>
        :root { --main: #f39c12; --bg: #0d0d0d; --box: #1a1a1a; --rojo: #e74c3c; --verde: #2ecc71; --blanco: #fff; }
        body { background: var(--bg); color: var(--blanco); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; text-align: center; overflow-x: hidden; }
        
        .pantalla { display: none; padding: 20px; max-width: 500px; margin: 0 auto; min-height: 100vh; }
        .activa { display: block; }
        
        input, select { width: 100%; background: #000; color: var(--main); border: 1px solid var(--main); padding: 15px; border-radius: 10px; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; text-align: center; outline: none; }
        .btn { background: var(--main); color: #000; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; margin-bottom: 15px; }
        .btn-verde { background: var(--verde); } .btn-rojo { background: var(--rojo); color: white;}
        
        .header { background: var(--box); border-bottom: 2px solid var(--main); padding: 15px; margin-bottom: 20px; border-radius: 0 0 15px 15px; }
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        
        /* 🎡 NUEVA RULETA 17 NÚMEROS 🎡 */
        .ruleta-wrapper { position: relative; width: 300px; height: 300px; margin: 30px auto; display: none; }
        .ruleta-wrapper.pequena { width: 220px; height: 220px; margin: 15px auto; }
        .ruleta-circulo { width: 100%; height: 100%; border-radius: 50%; border: 6px solid var(--blanco); position: relative; transition: transform 8s cubic-bezier(0.1, 0.8, 0.1, 1); box-shadow: 0 0 20px rgba(243, 156, 18, 0.5); }
        .ruleta-numero { position: absolute; width: 40px; height: 50%; left: calc(50% - 20px); top: 0; transform-origin: bottom center; text-align: center; color: white; font-weight: 900; font-size: 16px; padding-top: 8px; box-sizing: border-box; text-shadow: 2px 2px 4px #000; }
        .pequena .ruleta-numero { font-size: 12px; padding-top: 5px; }
        .puntero { position: absolute; top: -15px; left: calc(50% - 15px); width: 30px; height: 35px; background: var(--blanco); clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10; box-shadow: 0 5px 10px rgba(0,0,0,0.5); }
        
        #ruleta-publica { display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; height: 100vh;}
        .telon-negro { font-size: 20px; color: #555; animation: parpadeo 2s infinite; }
        @keyframes parpadeo { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        
        #loader { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; color:var(--main); justify-content:center; align-items:center; flex-direction:column; }
        .modal-premio { display:none; background: var(--main); color:black; padding: 10px 30px; font-size: 30px; font-weight: bold; border-radius: 10px; margin-top: 20px; animation: salto 1s ease; }
        @keyframes salto { 0% { transform: scale(0.5); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <script>
        const API_GAS = "https://script.google.com/macros/s/AKfycbwOmMwYOysgrE-ZS6s1OxfnY63G8s4F9FhzsJU9jqufLflVmeaOADowLPrQi2r4RemO/exec";
        const API_VISION = "TU_CLAVE_DE_GOOGLE_AQUI"; // <-- Pega tu llave aquí
        let usuarioActual = "";
        let fotoBase64Temporal = "";
    </script>

    <div id="loader"><h2 id="loader-txt">Procesando...</h2></div>

    <div id="pantalla-login" class="pantalla activa">
        <h1 style="color:var(--main); font-size: 40px; margin-bottom: 5px;">CASINO VIP</h1>
        <p style="color:#888; margin-bottom: 30px;">ADMINISTRACIÓN BAZZAN</p>
        
        <input type="text" id="l-user" placeholder="Usuario">
        <input type="password" id="l-pass" placeholder="Clave">
        <button class="btn" onclick="iniciarSesion()">Entrar (Personal)</button>
        <br><br><hr style="border-color:#333;"><br>
        <button class="btn" style="background:#333; color:white;" onclick="verRuletaPublica()">Ver Ruleta (Clientes)</button>
    </div>

    <div id="pantalla-dashboard" class="pantalla">
        <div class="header"><h3>CAJERO: <span id="nom-cajero" style="color:var(--main);"></span></h3></div>
        
        <div class="nav-grid">
            <button class="btn" onclick="mostrarSeccion('sec-vales')">🧾 VALES</button>
            <button class="btn" onclick="mostrarSeccion('sec-bonos')">🎁 BONOS</button>
            <button class="btn" onclick="mostrarSeccion('sec-ruleta')">🎡 RULETA</button>
            <button class="btn btn-rojo" onclick="location.reload()">SALIR</button>
        </div>

        <div id="sec-vales" style="display:block;">
            <h3 style="color:var(--main);">COBRO DE VOUCHER</h3>
            <input type="file" accept="image/*" capture="environment" id="cam-vale" style="display:none;" onchange="procesarFotoVision(this, 'vale')">
            <button class="btn" style="padding:30px; border:2px dashed var(--main); background:transparent; color:var(--main);" onclick="document.getElementById('cam-vale').click()">📸 FOTO AL MONITOR</button>
            
            <div id="form-vale" style="display:none; margin-top:20px;">
                <label style="font-size:12px; color:#888;">CÓDIGO:</label>
                <input type="text" id="v-cod">
                <label style="font-size:12px; color:#888;">MONTO MÁQUINA:</label>
                <input type="number" id="v-maq" oninput="document.getElementById('v-pag').value = Math.floor(this.value/100)*100">
                <label style="font-size:12px; color:#888;">A PAGAR AL CLIENTE:</label>
                <input type="number" id="v-pag" style="color:var(--verde); font-weight:bold; font-size:24px;">
                <button class="btn btn-verde" onclick="guardarDatosGAS('registrar_vale')">✅ APROBAR Y GUARDAR</button>
            </div>
        </div>

        <div id="sec-bonos" style="display:none;">
            <h3 style="color:var(--main);">BONO DIARIO $2.000</h3>
            <input type="file" accept="image/*" capture="environment" id="cam-bono" style="display:none;" onchange="procesarFotoVision(this, 'bono')">
            <button class="btn" style="padding:30px; border:2px dashed var(--verde); background:transparent; color:var(--verde);" onclick="document.getElementById('cam-bono').click()">📸 FOTO AL CARNET</button>
            
            <div id="form-bono" style="display:none; margin-top:20px;">
                <label style="font-size:12px; color:#888;">RUT DETECTADO:</label>
                <input type="text" id="b-rut">
                <button class="btn btn-verde" id="btn-aprobar-bono" onclick="guardarDatosGAS('registrar_bono')">✅ ENTREGAR $2.000</button>
            </div>
        </div>

        <div id="sec-ruleta" style="display:none;">
            <h3 style="color:var(--main);">CONTROL DE SORTEO</h3>
            <button class="btn" style="background:#555; color:white;" onclick="controlRuleta('ACTIVAR')">1. MOSTRAR A CLIENTES</button>
            <button class="btn btn-verde" onclick="girarRuletaAdmin()">2. GIRAR RULETA (8 SEGUNDOS)</button>
            
            <div class="ruleta-wrapper pequena" id="wrap-ruleta-cajero">
                <div class="puntero"></div>
                <div class="ruleta-circulo" id="ruleta-cajero"></div>
            </div>

            <button class="btn btn-rojo" onclick="controlRuleta('APAGAR')" style="margin-top:15px;">3. APAGAR (PANTALLA NEGRA)</button>
            
            <div style="background:#222; padding:15px; border-radius:10px; margin-top:20px;">
                <h4 style="margin-top:0;">🏆 REGISTRAR GANADOR</h4>
                <input type="number" id="s-maq" placeholder="Máquina Ganadora">
                <input type="number" id="s-monto" placeholder="Monto del Premio">
                <input type="file" accept="image/*" capture="environment" id="cam-ganador" style="display:none;" onchange="convertirFoto(this)">
                <button class="btn" onclick="document.getElementById('cam-ganador').click()">📸 FOTO CLIENTE / CARNET</button>
                <button class="btn btn-verde" onclick="guardarDatosGAS('registrar_sorteo')">✅ GUARDAR PREMIO</button>
            </div>
        </div>
    </div>

    <div id="ruleta-publica" class="pantalla">
        <div id="telon" class="telon-negro">⏳ ESPERANDO SORTEO BAZZAN...</div>
        
        <div class="ruleta-wrapper" id="wrap-ruleta-cliente">
            <div class="puntero"></div>
            <div class="ruleta-circulo" id="ruleta-cliente"></div>
        </div>
        
        <div id="premio-ganador" class="modal-premio">¡MÁQUINA GANADORA: <span id="ganador-txt"></span>!</div>
    </div>

    <script>
        function mostrarLoader(txt) { document.getElementById('loader-txt').innerText = txt; document.getElementById('loader').style.display = 'flex'; }
        function ocultarLoader() { document.getElementById('loader').style.display = 'none'; }
        function mostrarSeccion(id) { ['sec-vales','sec-bonos','sec-ruleta'].forEach(s => document.getElementById(s).style.display='none'); document.getElementById(id).style.display='block'; }

        // --- SISTEMA DE LOGIN ---
        async function iniciarSesion() {
            let u = document.getElementById('l-user').value; let p = document.getElementById('l-pass').value;
            mostrarLoader("Verificando...");
            try {
                let res = await fetch(`${API_GAS}?action=login&u=${u}&p=${p}`); let data = await res.json();
                if(data.status === "success") {
                    usuarioActual = data.usuario; document.getElementById('nom-cajero').innerText = usuarioActual;
                    document.getElementById('pantalla-login').classList.remove('activa'); document.getElementById('pantalla-dashboard').classList.add('activa');
                } else alert(data.mensaje);
            } catch(e) { alert("Error de red"); }
            ocultarLoader();
        }

        // --- DIBUJAR LAS RULETAS CON 17 NÚMEROS ---
        function construirRuletas(id) {
            let r = document.getElementById(id);
            r.innerHTML = '';
            let angulo = 360 / 17;
            let colores = ['#e74c3c', '#2980b9', '#27ae60', '#8e44ad', '#e67e22', '#16a085'];
            let bg = 'conic-gradient(';
            
            for(let i=1; i<=17; i++) {
                let start = (i-1)*angulo;
                let end = i*angulo;
                let color = colores[i % colores.length];
                bg += `${color} ${start}deg ${end}deg${i<17?',':')'}`;
                
                let num = document.createElement('div');
                num.className = 'ruleta-numero';
                num.style.transform = `rotate(${start + angulo/2}deg)`;
                num.innerText = i;
                r.appendChild(num);
            }
            r.style.background = bg;
        }
        
        // Inicializar ruletas
        construirRuletas('ruleta-cajero');
        construirRuletas('ruleta-cliente');

        // --- FUNCIÓN MATEMÁTICA PARA GIRAR ---
        function aplicarGiro(idContenedor, idRuleta, ganador) {
            let r = document.getElementById(idRuleta);
            document.getElementById(idContenedor).style.display = 'block';
            
            // Reiniciar posición rápidamente
            r.style.transition = 'none';
            r.style.transform = 'rotate(0deg)';
            
            setTimeout(() => {
                let angulo = 360 / 17;
                let centroSlice = (ganador - 1) * angulo + angulo / 2;
                let girosCompletos = 360 * 10; // 10 vueltas (da el efecto largo de 8 seg)
                let rotacionFinal = girosCompletos - centroSlice; // Frena exacto en el medio del ganador
                
                r.style.transition = 'transform 8s cubic-bezier(0.1, 0.7, 0.1, 1)';
                r.style.transform = `rotate(${rotacionFinal}deg)`;
            }, 50);
        }

        // --- CONTROL RULETA ADMIN ---
        async function controlRuleta(comando, ganador="") {
            fetch(`${API_GAS}?action=ruleta_control&comando=${comando}&ganador=${ganador}`);
            
            if(comando === 'ACTIVAR') {
                document.getElementById('wrap-ruleta-cajero').style.display = 'block';
            } else if (comando === 'APAGAR') {
                document.getElementById('wrap-ruleta-cajero').style.display = 'none';
            }
        }

        function girarRuletaAdmin() {
            let ganador = Math.floor(Math.random() * 17) + 1; // Sortea del 1 al 17
            controlRuleta("GIRAR", ganador);
            document.getElementById('s-maq').value = ganador;
            
            // Girar en la pantalla del cajero inmediatamente
            aplicarGiro('wrap-ruleta-cajero', 'ruleta-cajero', ganador);
        }

        // --- VISOR RULETA PÚBLICO (CLIENTES) ---
        let estadoAnterior = "";
        function verRuletaPublica() {
            document.getElementById('pantalla-login').classList.remove('activa');
            document.getElementById('ruleta-publica').classList.add('activa');
            setInterval(sincronizarRuleta, 2000); // Revisa más rápido (2 seg)
        }

        async function sincronizarRuleta() {
            try {
                let r = await fetch(`${API_GAS}?action=ruleta_estado`); let d = await r.json();
                let telon = document.getElementById('telon'); 
                let wrap = document.getElementById('wrap-ruleta-cliente');
                let premio = document.getElementById('premio-ganador');
                
                if(d.estado !== estadoAnterior) {
                    if(d.estado === "ESPERA") { 
                        telon.style.display = "block"; wrap.style.display = "none"; premio.style.display = "none";
                    }
                    if(d.estado === "ACTIVA") { 
                        telon.style.display = "none"; wrap.style.display = "block"; premio.style.display = "none";
                        document.getElementById('ruleta-cliente').style.transform = "rotate(0deg)";
                    }
                    if(d.estado === "GIRANDO") { 
                        telon.style.display = "none"; premio.style.display = "none";
                        aplicarGiro('wrap-ruleta-cliente', 'ruleta-cliente', d.ganador);
                        
                        // Mostrar el cartelito ganador justo cuando termine de girar (a los 8 segundos)
                        setTimeout(() => {
                            document.getElementById('ganador-txt').innerText = d.ganador;
                            premio.style.display = "block";
                        }, 8000);
                    }
                    estadoAnterior = d.estado;
                }
            } catch(e){}
        }

        // --- API VISION Y GUARDADO DE DATOS (Se mantiene igual que la versión anterior) ---
        async function procesarFotoVision(input, tipo) { /* ... Código omitido para no alargar (usa el mismo tuyo si gustas) ...*/ }
        async function guardarDatosGAS(accion) { /* ... Código omitido ...*/ }
        function comprimirImagen(file) { /* ... Código omitido ...*/ }
        function convertirFoto(input) { /* ... Código omitido ...*/ }
    </script>
</body>
</html>
