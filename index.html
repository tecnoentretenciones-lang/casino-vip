<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TECNOENTRETE - GESTIÓN TOTAL</title>
    <style>
        :root { --main: #f39c12; --bg: #0d0d0d; --box: #1a1a1a; --verde: #2ecc71; --azul: #3498db; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; overflow-x: hidden; }
        
        .pantalla { display: none; padding: 20px; max-width: 500px; margin: 0 auto; min-height: 100vh; flex-direction: column; box-sizing: border-box; }
        .activa { display: flex; }

        /* LOGO */
        .logo-text { font-size: 40px; font-weight: 900; color: var(--main); margin-top: 20px; }
        .sub-logo { color: #555; letter-spacing: 3px; font-size: 10px; text-transform: uppercase; margin-bottom: 20px; }

        /* FORMULARIOS */
        input, select, textarea { width: 100%; background: #000; color: var(--main); border: 1px solid #333; padding: 15px; border-radius: 12px; margin-bottom: 12px; box-sizing: border-box; text-align: center; font-size: 16px; outline: none; }
        .btn { background: var(--main); color: #000; border: none; padding: 18px; width: 100%; border-radius: 15px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-bottom: 10px; transition: 0.2s; }
        .btn-sec { background: #222; color: #fff; border: 1px solid #444; }
        .btn-azul { background: var(--azul); color: #fff; }

        /* RULETA (17 NÚMEROS) */
        .ruleta-wrapper { position: relative; width: 300px; height: 300px; margin: 20px auto; flex-shrink: 0; }
        .ruleta-circulo { width: 100%; height: 100%; border-radius: 50%; border: 6px solid #fff; position: relative; transition: transform 8s cubic-bezier(0.1, 0.8, 0.1, 1); overflow: hidden; background: #222; }
        .puntero { position: absolute; top: -25px; left: calc(50% - 20px); width: 40px; height: 50px; background: #fff; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10; }
        .segmento { position: absolute; width: 100%; height: 100%; top: 0; left: 0; border-radius: 50%; }
        .segmento span { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); font-weight: 900; font-size: 20px; color: #fff; text-shadow: 2px 2px 2px #000; }

        /* MENÚ GRID */
        .grid-herramientas { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: var(--box); padding: 15px; border-radius: 15px; border: 1px solid #333; cursor: pointer; }
    </style>
</head>
<body>

    <div id="p-login" class="pantalla activa">
        <h1 class="logo-text">TECNOENTRETE</h1>
        <p class="sub-logo">Gestión de Locales 2026</p>
        <input type="text" id="l-user" placeholder="USUARIO">
        <input type="password" id="l-pass" placeholder="CONTRASEÑA">
        <button class="btn" onclick="acceso()">INGRESAR</button>
        <button class="btn btn-sec" onclick="ir('p-publico')">🖥️ PANTALLA TV CLIENTES</button>
    </div>

    <div id="p-trabajo" class="pantalla">
        <h2 style="color:var(--main); margin:0;">BIENVENIDO</h2>
        <p id="rol-info" style="color:#888; margin-bottom:20px;">Local: Bazar</p>
        
        <div class="grid-herramientas">
            <div class="card" onclick="ir('p-pago-foto')">📸<br>FOTO PAGO</div>
            <div class="card" onclick="ir('p-bono')">🎁<br>DAR BONO</div>
            <div class="card" onclick="ir('p-ruleta-ctrl')">🎡<br>SORTEO</div>
            <div class="card" onclick="ir('p-clientes')">👥<br>CLIENTES</div>
            <div class="card" onclick="ir('p-contabilidad')">📑<br>MÁQUINAS</div>
            <div class="card" onclick="location.reload()">🚪<br>SALIR</div>
        </div>
    </div>

    <div id="p-pago-foto" class="pantalla">
        <button class="btn btn-sec" onclick="ir('p-trabajo')">⬅ VOLVER</button>
        <h3>REGISTRO DE PAGO</h3>
        <input type="file" accept="image/*" capture="environment">
        <input type="number" placeholder="Monto Pagado $">
        <input type="text" placeholder="Máquina o Comentario">
        <button class="btn" onclick="alert('Pago Registrado con éxito')">SUBIR COMPROBANTE</button>
    </div>

    <div id="p-clientes" class="pantalla">
        <button class="btn btn-sec" onclick="ir('p-trabajo')">⬅ VOLVER</button>
        <h3>LISTA DE CLIENTES</h3>
        <input type="text" id="cli-nom" placeholder="Nombre Completo">
        <input type="text" id="cli-rut" placeholder="RUT">
        <textarea id="cli-obs" placeholder="Observaciones (Gustos, Máquina favorita)"></textarea>
        <button class="btn btn-azul" onclick="alert('Cliente Guardado')">AGREGAR A BASE DE DATOS</button>
    </div>

    <div id="p-ruleta-ctrl" class="pantalla">
        <button class="btn btn-sec" onclick="ir('p-trabajo')">⬅ VOLVER</button>
        <div class="ruleta-wrapper" style="transform: scale(0.8); margin-top:-20px;">
            <div class="puntero"></div><div id="r-ctrl" class="ruleta-circulo"></div>
        </div>
        <button class="btn" style="background:var(--verde)" onclick="lanzarSorteo()">🎰 LANZAR SORTEO TV</button>
    </div>

    <div id="p-publico" class="pantalla">
        <h1 class="logo-text" style="font-size:50px;">TECNOENTRETE</h1>
        <div class="ruleta-wrapper" style="transform: scale(1.6); margin: 120px auto;">
            <div class="puntero"></div><div id="r-tv" class="ruleta-circulo"></div>
        </div>
        <h2 id="ganador-tv" style="font-size:50px; margin-top:100px; color:var(--main);">ESPERANDO JUGADA...</h2>
    </div>

    <script>
        const colores = ['#E50914','#1E90FF','#FFD700','#8A2BE2','#FF8C00','#00FA9A','#E50914','#1E90FF','#FFD700','#8A2BE2','#FF8C00','#00FA9A','#E50914','#1E90FF','#FFD700','#8A2BE2','#FF8C00'];

        function dibujarRuleta(id) {
            const r = document.getElementById(id);
            if(!r) return;
            r.innerHTML = '';
            const angulo = 360/17;
            let bg = 'conic-gradient(';
            for(let i=1; i<=17; i++){
                bg += `${colores[i-1]} ${(i-1)*angulo}deg ${i*angulo}deg${i<17?',':')'}`;
                let div = document.createElement('div');
                div.className = 'segmento';
                div.style.transform = `rotate(${(i-1)*angulo + angulo/2}deg)`;
                div.innerHTML = `<span>${i}</span>`;
                r.appendChild(div);
            }
            r.style.background = bg;
        }

        function ir(id) {
            document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
            document.getElementById(id).classList.add('activa');
            if(id === 'p-ruleta-ctrl' || id === 'p-publico') {
                dibujarRuleta('r-ctrl'); dibujarRuleta('r-tv');
            }
        }

        function acceso() {
            const u = document.getElementById('l-user').value.toUpperCase();
            const p = document.getElementById('l-pass').value;
            if(u !== "" && p !== "") {
                ir('p-trabajo');
                document.getElementById('rol-info').innerText = "TRABAJADOR: " + u + " | LOCAL: BAZAR";
            } else { alert("Ingresa tus credenciales"); }
        }

        function lanzarSorteo() {
            const ganador = Math.floor(Math.random() * 17) + 1;
            const ang = 360/17;
            const rotacion = 3600 - ((ganador-1)*ang + ang/2);
            
            [document.getElementById('r-ctrl'), document.getElementById('r-tv')].forEach(r => {
                if(r) {
                    r.style.transition = 'none'; r.style.transform = 'rotate(0deg)';
                    setTimeout(() => {
                        r.style.transition = 'transform 8s cubic-bezier(0.1, 0.7, 0.1, 1)';
                        r.style.transform = `rotate(${rotacion}deg)`;
                    }, 100);
                }
            });

            setTimeout(() => {
                const msg = "¡MÁQUINA " + ganador + " GANÓ!";
                document.getElementById('ganador-tv').innerText = msg;
                alert(msg);
            }, 8500);
        }

        window.onload = () => { dibujarRuleta('r-ctrl'); dibujarRuleta('r-tv'); };
    </script>
</body>
</html>
